<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" font-family="Segoe UI, Arial, sans-serif">
<style>
.chip{opacity:0;animation:chin 9s infinite}
@keyframes chin{0%{opacity:0;transform:translateY(9px)}5%{opacity:1;transform:none}88%{opacity:1}96%,100%{opacity:0}}
.hl rect{animation:glow 9s infinite}
@keyframes glow{0%,38%{fill:#242423;stroke:#3a3a38}46%,88%{fill:#58004E;stroke:#c569b6}96%,100%{fill:#242423}}
.fill{opacity:0;animation:fin 9s infinite}
@keyframes fin{0%,50%{opacity:0;transform:translateY(8px)}58%{opacity:1;transform:none}88%{opacity:1}96%,100%{opacity:0}}
</style>
<rect width="1000" height="470" rx="10" fill="#1a1819"/>
<rect x="2" y="2" width="996" height="466" rx="9" fill="#292928" stroke="#c569b6" stroke-width="1.5"/>
<text x="40" y="46" font-size="15" font-weight="700" letter-spacing="2" fill="#aaa099">HIZLI KURULUM</text>
<text x="958" y="48" font-size="20" fill="#aaa099" text-anchor="middle">&#10005;</text>
