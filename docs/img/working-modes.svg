@keyframes fo{0%,42%{opacity:.9}48%,94%{opacity:0}100%{opacity:.9}}
.free{opacity:0;animation:fr 10s infinite}
@keyframes fr{0%,46%{opacity:0}54%,90%{opacity:1}96%,100%{opacity:0}}
</style>
